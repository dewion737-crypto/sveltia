<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ page.title }} | {{ site.title }}</title>
<meta name="description" content="{{ page.description | default: site.description }}">
{% if page.canonical %}<link rel="canonical" href="{{ page.canonical }}">{% endif %}
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<!-- Open Graph -->
<meta property="og:title" content="{{ page.og_title | default: page.title }}">
<meta property="og:description" content="{{ page.og_description | default: page.description }}">
{% if page.og_image %}<meta property="og:image" content="{{ page.og_image }}">{% endif %}
<meta property="og:site_name" content="{{ site.title }}">

<style>
  :root {
    --green: #1db954;
    --green-dark: #17a045;
    --green-light: #e8f8ed;
    --bg: #f0f2f5;
    --card: #ffffff;
    --text: #1a1a1a;
    --text-muted: #555;
    --border: #e0e4ea;
    --shadow: 0 2px 16px rgba(0,0,0,0.07);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; font-size: 16px; line-height: 1.7; }

  /* Шапка */
  .site-header { background: #fff; border-bottom: 1px solid var(--border); padding: 16px 32px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; box-shadow: 0 1px 8px rgba(0,0,0,0.05); }
  .site-logo { font-size: 1.1rem; font-weight: 800; color: var(--green); text-decoration: none; }
  .site-nav { display: flex; gap: 28px; }
  .site-nav a { color: var(--text-muted); text-decoration: none; font-size: 0.9rem; font-weight: 500; }
  .site-nav a:hover { color: var(--green); }

  /* Карточки и контейнер */
  .page-wrap { max-width: 800px; margin: 0 auto; padding: 40px 20px 80px; }
  .card { background: var(--card); border-radius: 16px; box-shadow: var(--shadow); padding: 32px; margin-bottom: 24px; }

  /* Типографика */
  h2 { font-size: 1.4rem; font-weight: 800; color: var(--text); margin-bottom: 16px; letter-spacing: -0.02em; }
  h2 span { color: var(--green); }
  h3 { font-size: 1rem; font-weight: 700; color: var(--text); margin: 24px 0 12px; }
  p { margin-bottom: 14px; color: var(--text-muted); }
  p strong { color: var(--text); }

  /* Блоки с фразами */
  .phrase-block { border-radius: 12px; overflow: hidden; border: 1px solid var(--border); margin: 16px 0 24px; }
  .phrase-block-header { background: var(--green); color: #fff; padding: 10px 18px; font-size: 0.8rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; }
  .phrase-row { display: grid; grid-template-columns: 1fr 1fr; border-bottom: 1px solid var(--border); transition: background 0.15s; }
  .phrase-row:last-child { border-bottom: none; }
  .phrase-row:hover { background: var(--green-light); }
  .phrase-en { padding: 11px 18px; font-weight: 600; font-size: 0.9rem; border-right: 1px solid var(--border); color: var(--text); }
  .phrase-ru { padding: 11px 18px; font-size: 0.88rem; color: var(--text-muted); }

  /* Подсказки */
  .tip-box { background: var(--green-light); border-left: 4px solid var(--green); border-radius: 0 10px 10px 0; padding: 16px 20px; margin: 20px 0; font-size: 0.93rem; }
  .tip-box p { margin: 0; color: var(--text); }
  .tip-box strong { color: var(--green-dark); }
  .warn-box { background: #fff8e1; border-left: 4px solid #f5a623; border-radius: 0 10px 10px 0; padding: 14px 18px; margin: 16px 0; font-size: 0.92rem; color: var(--text); }

  /* Цитата */
  .pull-quote { text-align: center; font-size: 1.1rem; font-weight: 700; color: var(--text); padding: 24px 0; border-top: 2px solid var(--green-light); border-bottom: 2px solid var(--green-light); margin: 28px 0; line-height: 1.5; }
  .pull-quote span { color: var(--green); }

  /* CTA блок */
  .cta-block { background: var(--green); border-radius: 16px; padding: 40px 32px; text-align: center; margin: 8px 0 24px; }
  .cta-block h2 { color: #fff; font-size: 1.5rem; margin-bottom: 10px; }
  .cta-block p { color: rgba(255,255,255,0.85); margin-bottom: 24px; font-size: 0.97rem; }
  .cta-btn { display: inline-block; background: #fff; color: var(--green-dark); padding: 14px 32px; border-radius: 50px; font-weight: 700; font-size: 0.95rem; text-decoration: none; transition: transform 0.15s, box-shadow 0.15s; box-shadow: 0 4px 14px rgba(0,0,0,0.15); }
  .cta-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.2); }

  /* Теги */
  .tags { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 16px; }
  .tag { background: var(--green-light); color: var(--green-dark); padding: 4px 12px; border-radius: 20px; font-size: 0.78rem; font-weight: 600; }

  /* Футер статьи */
  .article-footer { border-top: 1px solid var(--border); padding-top: 20px; color: var(--text-muted); font-size: 0.85rem; }
  .article-footer a { color: var(--green); text-decoration: none; }

  /* Список постов на главной */
  .posts-grid { display: grid; gap: 20px; }
  .post-card { background: var(--card); border-radius: 16px; box-shadow: var(--shadow); padding: 24px 28px; text-decoration: none; color: inherit; display: block; transition: transform 0.15s, box-shadow 0.15s; border: 1px solid var(--border); }
  .post-card:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(0,0,0,0.1); }
  .post-card__tag { display: inline-block; background: var(--green-light); color: var(--green-dark); font-size: 0.72rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; padding: 3px 10px; border-radius: 20px; margin-bottom: 10px; }
  .post-card__title { font-size: 1.1rem; font-weight: 800; color: var(--text); margin-bottom: 8px; line-height: 1.3; }
  .post-card__excerpt { font-size: 0.88rem; color: var(--text-muted); margin-bottom: 12px; }
  .post-card__meta { font-size: 0.78rem; color: var(--text-muted); }

  /* Подвал сайта */
  .site-footer { background: #fff; border-top: 1px solid var(--border); padding: 32px; text-align: center; color: var(--text-muted); font-size: 0.85rem; margin-top: 40px; }
  .site-footer a { color: var(--green); text-decoration: none; }

  @media (max-width: 600px) {
    .site-nav { display: none; }
    .card { padding: 20px; }
    .phrase-row { grid-template-columns: 1fr; }
    .phrase-en { border-right: none; border-bottom: 1px solid var(--border); }
    .cta-block { padding: 28px 20px; }
    .site-header { padding: 14px 20px; }
  }
</style>
</head>
<body>

{% include header.html %}

{{ content }}

{% include footer.html %}

</body>
</html>
