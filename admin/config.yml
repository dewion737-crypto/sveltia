backend:
  name: github
  repo: dewion737-crypto/sveltia 

media_folder: media

collections:
  - name: posts
    label: Posts
    folder: _posts
    create: true
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Date, name: date, widget: datetime }
      - { label: Body, name: body, widget: markdown }
